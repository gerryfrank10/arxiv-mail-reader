# Local development database for arxiv-mail-reader.
#
#   docker compose up -d
#   docker compose down          # stop, keep data
#   docker compose down -v       # stop + wipe data
#
# Connection (already in server/.env.example):
#   postgres://arxiv:arxiv@localhost:5433/arxiv_reader
#
# Port 5433 is used (not 5432) to avoid colliding with any local Postgres
# you may already have running.

services:
  db:
    image: postgres:16-alpine
    container_name: arxiv-reader-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     arxiv
      POSTGRES_PASSWORD: arxiv
      POSTGRES_DB:       arxiv_reader
    ports:
      - "5433:5432"
    volumes:
      - arxiv_db_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U arxiv -d arxiv_reader"]
      interval: 5s
      timeout:  3s
      retries:  10

volumes:
  arxiv_db_data:
