# arxiv-mail-reader — services.
#
# Two ways to use this file:
#
#   1. Database only (for local dev with `npm run dev:all`):
#        npm run db:up            # docker compose up -d   (db service only)
#        npm run db:down
#
#   2. Full app + database (one command, prod-style — same locally or remote):
#        npm run app:up           # builds the image, starts db + app
#        npm run app:logs
#        npm run app:down
#      Then open http://localhost:3001
#
# The `app` service is gated behind the "app" compose profile, so a plain
# `docker compose up -d` (i.e. `npm run db:up`) still starts ONLY the database.
#
# Port 5433 is mapped to Postgres (not 5432) to avoid colliding with any local
# Postgres you may already have running.

services:
  db:
    image: postgres:16-alpine
    container_name: arxiv-reader-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     arxiv
      POSTGRES_PASSWORD: arxiv
      POSTGRES_DB:       arxiv_reader
    ports:
      - "5433:5432"
    volumes:
      - arxiv_db_data:/var/lib/postgresql/data
      # *.sql here run once, in order, when the data volume is first created —
      # this provisions the schema on a fresh deploy.
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U arxiv -d arxiv_reader"]
      interval: 5s
      timeout:  3s
      retries:  10

  app:
    profiles: ["app"]
    build:
      context: .
      args:
        # Read from your .env (compose auto-loads it). Only needed for Google login.
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: arxiv-reader-app
    restart: unless-stopped
    # Brings in SEMANTIC_SCHOLAR_API_KEY, OPENALEX_MAILTO, DISABLE_MAGAZINE_SCHEDULER, etc.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      # Talk to the db service over the compose network (overrides .env's localhost value).
      DATABASE_URL: postgres://arxiv:arxiv@db:5432/arxiv_reader
      UPLOAD_ROOT: /app/uploads
      # A localhost AI base URL (e.g. Ollama) configured in the browser points at
      # the CONTAINER otherwise; this makes the server reach the host instead.
      LOCALHOST_PROXY_HOST: host.docker.internal
    ports:
      - "3001:3001"
    volumes:
      # Persist uploaded book files on the host (survives `db:reset`).
      - ./uploads:/app/uploads
    # Lets the container resolve the host machine (for host-run Ollama, etc.).
    # Built in on Docker Desktop (Mac/Windows); this line adds it on Linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  # Optional self-contained Ollama (for a remote box with no host Ollama).
  # Opt-in only:  npm run ollama:up   (or add --profile ollama to compose).
  #
  # It publishes 11434 on the host, so the app's localhost->host.docker.internal
  # rewrite reaches it with no config change — keep the base URL in Settings as
  # http://localhost:11434/v1 everywhere.
  #
  # On your Mac, DON'T enable this — keep using host Ollama (Metal GPU). Running
  # this here would also collide with host Ollama on port 11434.
  #
  # After it's up, pull a model once:  npm run ollama:pull
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: arxiv-reader-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # For an NVIDIA GPU host, uncomment to enable acceleration (needs the
    # nvidia-container-toolkit installed on the host):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  arxiv_db_data:
  ollama_models:
